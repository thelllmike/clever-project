<svg width="180" height="44" viewBox="0 0 180 44" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- CP House Logo -->
  <g>
    <!-- Outer roof chevron -->
    <path d="M18 14L5 14L18 2L31 14L18 14Z" fill="none" stroke="white" stroke-width="0"/>
    <polygon points="18,1 2,13.5 5,13.5 18,4 31,13.5 34,13.5" fill="white"/>
    <!-- Inner roof chevron -->
    <polygon points="18,5 6,15 8.5,15 18,7.5 27.5,15 30,15" fill="white"/>

    <!-- C shape - left block -->
    <path d="M5,15 L5,40 L16,40 L16,36 L10,36 L10,19 L16,19 L16,15 Z" fill="white"/>
    <!-- Small square notch at bottom of C -->
    <rect x="13" y="33" width="3" height="3" fill="white"/>

    <!-- P shape - right block sharing center wall -->
    <path d="M16,15 L16,40 L21,40 L21,28 L28,28 L28,15 Z" fill="white"/>
    <!-- P window cutout - transparent hole -->
    <rect x="21" y="19" width="5" height="5" fill="#08080c"/>
  </g>

  <!-- Text: CLEVER PROJECT -->
  <text x="42" y="18" font-family="'Clash Display', 'Inter', sans-serif" font-size="13.5" font-weight="600" fill="white" letter-spacing="0.5">CLEVER</text>
  <text x="42" y="33" font-family="'Clash Display', 'Inter', sans-serif" font-size="13.5" font-weight="400" fill="rgba(255,255,255,0.6)" letter-spacing="0.5">PROJECT</text>
</svg>
